server {
        listen 443 ssl;
        server_name ai2god.club;  # 替换为你的域名

        ssl_certificate ./nssl/ai2god.club.crt;
        ssl_certificate_key ./nssl/ai2god.club.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;

        location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        try_files $uri $uri/ =404;
        }
    }

server {
        listen 443 ssl;
        server_name www.ai2god.club;  # 替换为你的域名

        ssl_certificate ./nssl/www.ai2god.club.crt;
        ssl_certificate_key ./nssl/www.ai2god.club.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            try_files $uri $uri/ =404;
        }
    }

    # 自动将 HTTP 跳转到 HTTPS
server {
        listen 80;
        server_name ai2god.club www.ai2god.club;
        return 301 https://$host$request_uri;
    }

